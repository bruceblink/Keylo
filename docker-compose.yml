services:
  postgres:
    image: postgres:17-alpine
    container_name: keylo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keylo_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: keylo
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keylo_user -d keylo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  redis:
    image: redis:8.6.2-alpine
    container_name: keylo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  keylo:
    build:
      context: .
      dockerfile: Dockerfile
    image: keylo:latest
    container_name: keylo-service
    restart: unless-stopped
    environment:
      TZ: UTC
      DATABASE_URL: postgres://keylo_user@postgres:5432/keylo
      SERVER_PORT: ${SERVER_PORT:-2345}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ADMIN_CLIENT_ID: ${ADMIN_CLIENT_ID}
      ADMIN_CLIENT_SECRET: ${ADMIN_CLIENT_SECRET}
      ENABLE_SETUP_WIZARD: ${ENABLE_SETUP_WIZARD:-true}
      SETUP_TOKEN: ${SETUP_TOKEN}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${KEYLO_RUST_LOG:-keylo=debug,axum=info,tower_http=info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_DIR: /app/logs
      LOG_FILE_PREFIX: ${LOG_FILE_PREFIX:-keylo}
    ports:
      - "${SERVER_PORT:-2345}:2345"
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/app/logs
    secrets:
      - postgres_password_enc
      - database_password_key
    networks:
      - keylo_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  postgres_password_enc:
    file: ./secrets/postgres_password.enc
  database_password_key:
    file: ./secrets/database_password.key

networks:
  keylo_network:
    driver: bridge

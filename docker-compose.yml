services:
  postgres:
    image: postgres:17-alpine
    container_name: keylo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keylo_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-keylo}
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keylo_user} -d ${POSTGRES_DB:-keylo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  redis:
    image: redis:8.6.2-alpine
    container_name: keylo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  keylo:
    build:
      context: .
      dockerfile: Dockerfile
    image: keylo:latest
    container_name: keylo-service
    restart: unless-stopped
    environment:
      TZ: UTC
      ENVIRONMENT: ${ENVIRONMENT:-production}
      JWT_ISSUER: ${JWT_ISSUER:-keylo}
      JWT_KEY_ID: ${JWT_KEY_ID:-keylo-rs256-1}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/public.pem}
      DATABASE_URL: ${DATABASE_URL:-postgres://keylo_user@postgres:5432/keylo}
      DATABASE_PASSWORD_ENC_FILE: /run/secrets/postgres_password_enc
      DATABASE_PASSWORD_KEY_FILE: /run/secrets/database_password_key
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      SERVER_ADDR: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-2345}
      ADMIN_CLIENT_ID: ${ADMIN_CLIENT_ID:-cli-admin-root}
      ADMIN_CLIENT_SECRET: ${ADMIN_CLIENT_SECRET:-replace-with-strong-admin-secret}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-keylo}
      RUST_LOG: ${RUST_LOG:-keylo=info,axum=info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_FILE_PREFIX: ${LOG_FILE_PREFIX:-keylo}
    ports:
      - "${SERVER_PORT:-2345}:2345"
    volumes:
      - ${JWT_KEYS_DIR:-./keys}:/app/keys:ro
      - ${LOGS_DIR:-./logs}:/app/logs
    secrets:
      - postgres_password_enc
      - database_password_key
    networks:
      - keylo_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  postgres_password_enc:
    file: ${DATABASE_PASSWORD_ENC_FILE:-./secrets/postgres_password.enc}
  database_password_key:
    file: ${DATABASE_PASSWORD_KEY_FILE:-./secrets/database_password.key}

networks:
  keylo_network:
    driver: bridge

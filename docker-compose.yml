services:
  postgres:
    image: postgres:17-alpine
    container_name: keylo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keylo_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-keylo}
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keylo_user} -d ${POSTGRES_DB:-keylo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  redis:
    image: redis:8.6.2-alpine
    container_name: keylo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  keylo:
    build:
      context: .
      dockerfile: Dockerfile
    image: keylo:latest
    container_name: keylo-service
    restart: unless-stopped
    environment:
      TZ: UTC
      DATABASE_URL: postgres://keylo_user@postgres:5432/keylo
      SERVER_PORT: ${SERVER_PORT:-2345}
      ADMIN_CLIENT_SECRET: ${ADMIN_CLIENT_SECRET:?ADMIN_CLIENT_SECRET is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    ports:
      - "${SERVER_PORT:-2345}:2345"
    volumes:
      - ${JWT_KEYS_DIR:-./keys}:/app/keys:ro
      - ${LOGS_DIR:-./logs}:/app/logs
    secrets:
      - postgres_password_enc
      - database_password_key
    networks:
      - keylo_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  postgres_password_enc:
    file: ${DATABASE_PASSWORD_ENC_FILE:-./secrets/postgres_password.enc}
  database_password_key:
    file: ${DATABASE_PASSWORD_KEY_FILE:-./secrets/database_password.key}

networks:
  keylo_network:
    driver: bridge

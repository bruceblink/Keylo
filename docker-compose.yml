version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    container_name: keylo-postgres
    environment:
      POSTGRES_USER: keylo_user
      POSTGRES_PASSWORD: keylo_password
      POSTGRES_DB: keylo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keylo_user -d keylo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  # Redis for session/token caching (optional)
  redis:
    image: redis:8.6.2-alpine
    container_name: keylo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_network

  # keylo
  # ─────────────────────────────────────────
  keylo:
    build:
      context: .
      dockerfile: Dockerfile
    image: keylo:latest
    container_name: keylo-service
    restart: unless-stopped
    environment:
      TZ: UTC
      ENVIRONMENT: production
      DATABASE_URL: postgres://keylo_user:keylo_password@postgres:5432/keylo
      SERVER_ADDR: 127.0.0.1
      SERVER_PORT: ${SERVER_PORT:-2345}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-keylo}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-12345}
      RUST_LOG: keylo=debug,axum=info
    ports:
      - "${SERVER_PORT:-2345}:2345"
    networks:
      - keylo_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  keylo_network:
    driver: bridge

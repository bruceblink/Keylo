services:
  postgres:
    image: postgres:17-alpine
    container_name: keylo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keylo_user
      POSTGRES_PASSWORD_FILE: /run/secrets/.database_password
      POSTGRES_DB: keylo
    secrets:
      - source: database_password
        target: .database_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keylo_user -d keylo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_db_network

  redis:
    image: redis:8.6.2-alpine
    container_name: keylo-redis
    restart: unless-stopped
    command: ["redis-server", "--aclfile", "/run/secrets/.redis.acl", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    secrets:
      - source: redis_acl
        target: .redis.acl
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping 2>&1 | grep -E 'PONG|NOAUTH'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keylo_redis_network

  keylo:
    build:
      context: .
      dockerfile: Dockerfile
    image: keylo:latest
    container_name: keylo-service
    restart: unless-stopped
    environment:
      TZ: UTC
      DATABASE_URL: postgres://keylo_user@postgres:5432/keylo
      SERVER_PORT: ${SERVER_PORT:-2345}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ADMIN_CLIENT_ID: ${ADMIN_CLIENT_ID}
      ADMIN_CLIENT_SECRET: ${ADMIN_CLIENT_SECRET}
      ENABLE_SETUP_WIZARD: ${ENABLE_SETUP_WIZARD:-true}
      SETUP_TOKEN: ${SETUP_TOKEN}
      REDIS_URL_ENC_FILE: /run/secrets/.redis_url.enc
      REDIS_URL_KEY_FILE: /run/secrets/.redis_url.key
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      RUST_LOG: ${KEYLO_RUST_LOG:-keylo=debug,axum=info,tower_http=info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_DIR: /app/logs
      LOG_FILE_PREFIX: ${LOG_FILE_PREFIX:-keylo}
    ports:
      - "${SERVER_PORT:-2345}:2345"
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/app/logs
    secrets:
      - source: database_password_enc
        target: .database_password.enc
      - source: database_password_key
        target: .database_password.key
      - source: redis_url_enc
        target: .redis_url.enc
      - source: redis_url_key
        target: .redis_url.key
    networks:
      - keylo_public_network
      - keylo_db_network
      - keylo_redis_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

secrets:
  database_password:
    file: ./.secrets/.database_password
  database_password_enc:
    file: ./.secrets/.database_password.enc
  database_password_key:
    file: ./.secrets/.database_password.key
  redis_acl:
    file: ./.secrets/.redis.acl
  redis_url_enc:
    file: ./.secrets/.redis_url.enc
  redis_url_key:
    file: ./.secrets/.redis_url.key

networks:
  keylo_public_network:
    driver: bridge
  keylo_db_network:
    driver: bridge
    internal: true
  keylo_redis_network:
    driver: bridge
    internal: true
